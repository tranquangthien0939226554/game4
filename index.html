<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🥿 Ném Dép Ông Bán Cháo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Baloo 2',cursive;touch-action:none;user-select:none;}
#W{position:relative;width:100%;height:100%;max-width:430px;margin:0 auto;overflow:hidden;}
/* ── NỀN: bầu trời trên, vỉa hè dưới ── */
#bg{position:absolute;inset:0;background:linear-gradient(180deg,#87CEEB 0%,#b8e0f5 40%,#b8e0f5 40%,#c8b898 100%);}
/* Vỉa hè gạch — chiếm nửa dưới, nơi người chơi đứng */
#tiles{position:absolute;bottom:0;left:0;right:0;height:52%;background-color:#c8aa72;background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.07) 0 1px,transparent 1px 52px),repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0 1px,transparent 1px 52px);}
/* Đường ngang — dải giữa màn hình */
#road{position:absolute;bottom:46%;left:0;right:0;height:14%;background:linear-gradient(180deg,#4a4a4a,#606060);z-index:4;}
#road-line{position:absolute;top:45%;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#ffe066 0 36px,transparent 36px 72px);animation:roadAnim 0.5s linear infinite;}
#road-edge-top{position:absolute;top:0;left:0;right:0;height:3px;background:#888;}
#road-edge-bot{position:absolute;bottom:0;left:0;right:0;height:3px;background:#888;}
@keyframes roadAnim{from{background-position:0 0}to{background-position:-72px 0}}
/* Đường dọc — tạo ngã tư, phía phải màn hình */
#road-vert{position:absolute;right:18%;top:0;bottom:0;width:14%;background:#505050;z-index:3;}
#road-vert-line{position:absolute;left:45%;top:0;bottom:0;width:4px;background:repeating-linear-gradient(180deg,#ffe066 0 36px,transparent 36px 72px);animation:roadAnimV 0.5s linear infinite;}
#road-vert-edge-l{position:absolute;left:0;top:0;bottom:0;width:3px;background:#888;}
#road-vert-edge-r{position:absolute;right:0;top:0;bottom:0;width:3px;background:#888;}
@keyframes roadAnimV{from{background-position:0 0}to{background-position:0 72px}}
/* Góc ngã tư — che vạch kẻ chỗ giao nhau */
#intersection{position:absolute;right:18%;bottom:46%;width:14%;height:14%;background:#555;z-index:5;}
/* Nhà cửa nền phố */
#buildings{position:absolute;top:0;left:0;right:0;height:40%;display:flex;align-items:flex-end;overflow:hidden;}
.bld{flex-shrink:0;border-radius:3px 3px 0 0;position:relative;}
.bld-win{position:absolute;background:rgba(255,240,180,.7);border:1px solid rgba(0,0,0,.15);border-radius:2px;}
/* Cây vỉa hè — đứng ở mép đường, z thấp hơn ông */
.tree{position:absolute;bottom:58%;display:flex;flex-direction:column;align-items:center;z-index:5;}
.tree-top{background:radial-gradient(circle,#4a9e3f,#2d7a25);border-radius:50%;box-shadow:0 4px 8px rgba(0,0,0,.2);}
.tree-trunk{background:#8B5E3C;border-radius:2px;}
/* Xe máy chạy trên đường */
.moto-far{position:absolute;bottom:47%;font-size:clamp(16px,4vw,28px);opacity:.85;filter:drop-shadow(1px 1px 2px rgba(0,0,0,.3));z-index:8;}
#m1{left:-60px;animation:motoL 6s linear infinite;}
#m2{left:-60px;animation:motoL 10s linear infinite 3.5s;font-size:clamp(12px,3vw,20px);opacity:.6;}
@keyframes motoL{from{transform:translateX(-60px)}to{transform:translateX(110vw)}}
/* Bong bóng thoại */
#speech{position:absolute;z-index:50;background:#fff;border:2px solid #333;border-radius:12px;padding:6px 10px;font-size:clamp(9px,2.5vw,14px);font-weight:800;color:#333;white-space:nowrap;display:none;pointer-events:none;}
#speech::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#333;}
@keyframes tearDrop{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(40px)}}
#ong-group.laugh{animation:laughBounce 0.35s ease-in-out infinite;}
@keyframes laughBounce{0%,100%{transform:translateY(0) rotate(0)}40%{transform:translateY(-7px) rotate(-3deg)}70%{transform:translateY(-3px) rotate(3deg)}}


/* ══ CHẾ ĐỘ 2: NÉ DÉP ══ */
#m2-hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:60;display:none;gap:10px;align-items:center;background:rgba(0,0,0,.72);border-radius:40px;padding:6px 18px;backdrop-filter:blur(8px);border:1px solid rgba(255,100,100,.3);white-space:nowrap;}
#m2-instr{position:absolute;bottom:clamp(8px,2.5vw,18px);left:50%;transform:translateX(-50%);z-index:60;font-size:clamp(10px,2.8vw,14px);font-weight:700;color:rgba(255,255,255,.92);text-shadow:1px 1px 4px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none;display:none;text-align:center;}
/* Canvas quỹ đạo dép */
#m2-canvas{position:absolute;inset:0;pointer-events:none;z-index:38;display:none;}
/* Người ném bên phải */
#m2-thrower{position:absolute;right:2%;bottom:44%;z-index:15;display:none;width:clamp(38px,10vw,68px);}
/* Ông thu nhỏ trong mode2 */
#ong-group.m2-small{transform-origin:bottom center;transform:scale(0.55);}
#ong-group.m2-small.jump{animation:ongJumpS 0.45s ease-out;}
@keyframes ongJumpS{0%{bottom:44%}35%{bottom:63%}65%{bottom:63%}100%{bottom:44%}}
#ong-group.m2-small.duck{animation:ongDuckS 0.45s ease-out;}
@keyframes ongDuckS{0%,100%{transform:scale(0.55) translateY(0)}45%,55%{transform:scale(0.55) scaleY(0.45) translateY(22px)}}
/* Dép bay mode 2 */
.dep2{position:absolute;pointer-events:none;z-index:40;font-size:clamp(22px,6vw,36px);filter:drop-shadow(2px 3px 4px rgba(0,0,0,.6));}
/* Nhãn gợi ý né */
#m2-hint{position:absolute;z-index:61;font-size:clamp(18px,5vw,30px);font-weight:900;pointer-events:none;display:none;text-align:center;text-shadow:2px 2px 0 #000,-2px -2px 0 #000;animation:hintPop .3s cubic-bezier(.36,2,.6,1) both;}
@keyframes hintPop{from{transform:translate(-50%,-50%) scale(0)}to{transform:translate(-50%,-50%) scale(1)}}
/* Vùng bấm toàn màn hình mode2 */
#tap-zone{position:absolute;inset:0;z-index:36;display:none;}
/* Hiệu ứng vị trí bấm */
.tap-ripple{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(255,255,100,.4);border:3px solid rgba(255,255,100,.8);pointer-events:none;z-index:62;animation:ripple .5s ease-out forwards;}
@keyframes ripple{from{transform:translate(-50%,-50%) scale(0);opacity:1}to{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
@keyframes hitFlash{0%,100%{opacity:1}50%{opacity:.15}}
#ong-group.hit{animation:hitFlash 0.18s ease-out 4;}

#player-girl.throwing{animation:throwArm .3s ease-out;}
@keyframes throwArm{0%{transform:rotate(0)}50%{transform:rotate(8deg) translateY(-5px)}100%{transform:rotate(0)}}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:10px;align-items:center;background:rgba(0,0,0,.72);border-radius:40px;padding:6px 18px;backdrop-filter:blur(8px);border:1px solid rgba(255,210,50,.25);white-space:nowrap;}
.hi{text-align:center;color:#fff;font-size:clamp(10px,2.5vw,15px);font-weight:700;}
.hi b{display:block;font-size:clamp(15px,4vw,22px);color:#ffd700;line-height:1.1;}
.hs{width:1px;height:32px;background:rgba(255,210,50,.25);}
#dep-icons{position:absolute;bottom:clamp(36px,9vw,56px);left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:60;pointer-events:none;}
.di{font-size:clamp(16px,4.5vw,26px);transition:opacity .3s;filter:drop-shadow(1px 2px 3px rgba(0,0,0,.5));}
.di.used{opacity:.2;}
/* ══ GUNBOUND UI ══ */
#gb-ui{position:absolute;bottom:clamp(58px,14vw,95px);left:50%;transform:translateX(-50%);z-index:60;display:none;flex-direction:column;align-items:center;gap:6px;}
#gb-angle-wrap{display:flex;align-items:center;gap:8px;}
#gb-angle-lbl{color:#fff;font-size:clamp(10px,2.8vw,14px);font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.9);white-space:nowrap;}
#gb-angle-bar{width:clamp(90px,24vw,160px);height:10px;background:rgba(0,0,0,.5);border-radius:10px;border:2px solid rgba(100,200,255,.5);overflow:hidden;position:relative;}
#gb-angle-fill{height:100%;background:linear-gradient(90deg,#22c55e,#06b6d4);border-radius:10px;transition:width .02s;}
#gb-pwr-wrap{display:flex;align-items:center;gap:8px;}
#gb-pwr-lbl{color:#fff;font-size:clamp(10px,2.8vw,14px);font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.9);white-space:nowrap;}
#gb-pwr-track{width:clamp(90px,24vw,160px);height:13px;background:rgba(0,0,0,.55);border-radius:20px;border:2px solid rgba(255,200,50,.5);overflow:hidden;}
#gb-pwr-fill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);border-radius:20px;transition:width .04s;}
#gb-wind{color:#fff;font-size:clamp(11px,3vw,15px);font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.9);white-space:nowrap;letter-spacing:1px;}
/* Vòng ngắm Gunbound */
#gb-sight{position:absolute;pointer-events:none;z-index:55;display:none;}
#gb-sight-line{position:absolute;pointer-events:none;z-index:54;display:none;inset:0;}

#instr{position:absolute;bottom:clamp(12px,3.5vw,22px);left:50%;transform:translateX(-50%);z-index:60;font-size:clamp(10px,2.8vw,15px);font-weight:700;color:rgba(255,255,255,.92);text-shadow:1px 1px 4px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none;}
#combo{position:absolute;top:clamp(52px,13vw,82px);left:50%;transform:translateX(-50%);z-index:60;font-size:clamp(16px,4.5vw,28px);font-weight:900;color:#fff;text-shadow:2px 2px 0 #8b1a00,-2px -2px 0 #8b1a00;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
.adt{position:absolute;border-radius:50%;background:rgba(255,255,100,.75);pointer-events:none;z-index:32;box-shadow:0 0 5px rgba(255,255,100,.5);}
.fdep{position:absolute;pointer-events:none;z-index:40;font-size:clamp(24px,6.5vw,42px);filter:drop-shadow(2px 3px 5px rgba(0,0,0,.55));transform-origin:center center;}
.spl{position:absolute;pointer-events:none;z-index:65;font-family:'Baloo 2',cursive;font-weight:900;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;animation:splUp .95s ease-out forwards;}
@keyframes splUp{0%{opacity:1;transform:translateY(0) scale(1)}55%{opacity:1;transform:translateY(-52px) scale(1.18)}100%{opacity:0;transform:translateY(-90px) scale(.75)}}
.ptcl{position:absolute;pointer-events:none;z-index:62;animation:ptFly .65s ease-out forwards;}
@keyframes ptFly{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:var(--t) scale(.1)}}
#ov{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.68);backdrop-filter:blur(10px);}
.ovb{background:linear-gradient(145deg,#fff9e8,#ffe880);border-radius:22px;padding:clamp(16px,5vw,32px) clamp(18px,6vw,44px);text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.7);max-width:86vw;border:3px solid #f59e0b;}
.ovb h1{font-size:clamp(20px,6vw,38px);color:#7a1a00;line-height:1.15;margin-bottom:4px;}
.ovb .sc{font-size:clamp(36px,10vw,62px);font-weight:900;color:#c2400c;line-height:1;margin:6px 0;}
.ovb .grd{font-size:clamp(13px,3.5vw,19px);font-weight:800;color:#7a1a00;margin-bottom:10px;}
.ovb p{font-size:clamp(11px,3vw,16px);color:#5a1a00;margin-bottom:14px;line-height:1.6;}
.btn{background:#7a1a00;color:#ffd700;border:none;border-radius:50px;padding:clamp(9px,2.5vw,15px) clamp(20px,7vw,44px);font-size:clamp(14px,4vw,21px);font-family:'Baloo 2',cursive;font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 0 #4a0a00,0 7px 16px rgba(0,0,0,.4);transition:transform .12s,box-shadow .12s;touch-action:manipulation;margin:3px;}
.btn:active{transform:translateY(5px);box-shadow:0 0 0 #4a0a00;}
.btn-fb{background:linear-gradient(135deg,#1877f2,#0d5dbf);color:#fff;box-shadow:0 5px 0 #0a3d9e,0 7px 16px rgba(0,0,0,.4);}
</style>
</head>

</div>
<!-- Cây vỉa hè -->

<script>
// ════════ STATE MODE 1 ════════
let score=0,deps=5,hits=0,combo=0,maxCombo=0;
let active=false,pressing=false;
let px0=0,py0=0,power=0,pwrTimer=null;
let ongX=48,ongDir=1,ongSpeed=1.2,ongTimer=null;
let comboTimer=null;

const W=document.getElementById('W');
const ov=document.getElementById('ov');
const ovb=document.getElementById('ovb');
const ongGroup=document.getElementById('ong-group');
const speechEl=document.getElementById('speech');
const sv=document.getElementById('sv');
const dv=document.getElementById('dv');
const hv=document.getElementById('hv');
const pwrUI=document.getElementById('pwr');
const pwrFill=document.getElementById('pwr-fill');
const adc=document.getElementById('adc');
const comboEl=document.getElementById('combo');
const girl=document.getElementById('player-girl');
const zzz=document.getElementById('zzz');
const instr=document.getElementById('instr');

function setFace(mode){
  document.getElementById('eyes-sleep').style.display=mode==='sleep'?'':'none';
  document.getElementById('eyes-cry').style.display=mode==='cry'?'':'none';
  document.getElementById('eyes-laugh').style.display=mode==='laugh'?'':'none';
  document.getElementById('mouth-normal').style.display=mode==='sleep'?'':'none';
  document.getElementById('mouth-sad').style.display=mode==='cry'?'':'none';
  document.getElementById('mouth-laugh').style.display=mode==='laugh'?'':'none';
  zzz.setAttribute('opacity',mode==='sleep'?'0.8':'0');
}
function ongCenter(){
  const r=ongGroup.getBoundingClientRect(),wr=W.getBoundingClientRect();
  return{x:r.left-wr.left+r.width*.5,y:r.top-wr.top+r.height*.5};
}

function startOng(){
  ongX=48;ongDir=1;ongSpeed=1.2;
  let ongBaseBottom=44,ongJumping=false;
  ongGroup.style.transition='';ongGroup.style.transform='';
  ongGroup.classList.remove('laugh','bonk');
  ongGroup.style.display='block';
  setFace('sleep');speechEl.style.display='none';
  if(ongTimer)clearInterval(ongTimer);
  ongTimer=setInterval(function(){
    if(!active)return;
    ongX+=ongDir*ongSpeed*(0.8+Math.random()*0.7);
    if(ongX>68){ongDir=-1;ongSpeed=1.0+Math.random()*1.2;}
    if(ongX<16){ongDir=1;ongSpeed=1.0+Math.random()*1.2;}
    if(!ongJumping&&Math.random()<0.008){
      ongJumping=true;
      var jt=0;
      var ji=setInterval(function(){
        jt++;
        ongBaseBottom=44+Math.sin(jt/10*Math.PI)*22;
        if(jt>=10){clearInterval(ji);ongJumping=false;ongBaseBottom=44;}
      },40);
    }
    ongGroup.style.left=ongX+'%';
    ongGroup.style.bottom=ongBaseBottom+'%';
  },40);
}

// ════ GUNBOUND SYSTEM ════
var gbAngle=45,gbPower=0,gbWind=0,gbAngleDir=1;
var gbAngleTimer=null,gbPowerTimer=null;
var gbFiring=false,gbPhase='angle';

var gbUI=document.getElementById('gb-ui');
var gbAngleLbl=document.getElementById('gb-angle-lbl');
var gbAngleFill=document.getElementById('gb-angle-fill');
var gbPwrLbl=document.getElementById('gb-pwr-lbl');
var gbPwrFill=document.getElementById('gb-pwr-fill');
var gbWindLbl=document.getElementById('gb-wind');
var gbSight=document.getElementById('gb-sight');
var gbCanvas=document.getElementById('gb-sight-line');
var gbCtx=gbCanvas.getContext('2d');

function gbNewWind(){
  gbWind=Math.round((Math.random()*10-5)*10)/10;
  gbWindLbl.textContent='💨 GIÓ: '+(gbWind>0?'→ ':'← ')+Math.abs(gbWind);
}
function gbGetOrigin(){
  var wr=W.getBoundingClientRect(),gr=girl.getBoundingClientRect();
  return{x:gr.left-wr.left+gr.width*0.8,y:gr.top-wr.top+gr.height*0.18};
}
function gbDrawTrajectory(){
  gbCtx.clearRect(0,0,gbCanvas.width,gbCanvas.height);
  var o=gbGetOrigin();
  var pwrFrac=(gbPhase==='power'?gbPower/100:0.5);
  var spd=pwrFrac*20+5;
  var rad=gbAngle*Math.PI/180;
  var vx=Math.cos(rad)*spd;  // bắn sang PHẢI (về phía ông)
  var vy=-Math.sin(rad)*spd;
  var grav=0.42,wind=gbWind*0.07;
  var px=o.x,py=o.y,pvx=vx,pvy=vy;
  gbCtx.save();
  gbCtx.strokeStyle='rgba(0,255,255,0.75)';
  gbCtx.lineWidth=2.5;gbCtx.setLineDash([7,5]);
  gbCtx.shadowColor='#0ff';gbCtx.shadowBlur=8;
  gbCtx.beginPath();gbCtx.moveTo(px,py);
  var lastX=px,lastY=py;
  for(var i=0;i<100;i++){
    pvx+=wind;pvy+=grav;
    px+=pvx;py+=pvy;
    if(px>gbCanvas.width+30||py>gbCanvas.height+30)break;
    gbCtx.lineTo(px,py);
    lastX=px;lastY=py;
  }
  gbCtx.stroke();
  gbSight.style.left=lastX+'px';gbSight.style.top=lastY+'px';
  gbCtx.restore();
}
function gbStartRound(){
  if(!active||deps<=0){checkEnd();return;}
  gbFiring=false;gbPhase='angle';gbPower=0;
  gbAngle=45;gbAngleDir=1;
  gbNewWind();
  gbCanvas.width=W.offsetWidth;gbCanvas.height=W.offsetHeight;
  gbUI.style.display='flex';
  gbCanvas.style.display='block';gbSight.style.display='block';
  gbPwrFill.style.width='0%';gbPwrLbl.textContent='💪 LỰC: 0%';
  if(gbAngleTimer)clearInterval(gbAngleTimer);
  gbAngleTimer=setInterval(function(){
    if(!active||gbPhase!=='angle')return;
    gbAngle+=gbAngleDir*1.8;
    if(gbAngle>=85){gbAngleDir=-1;}
    if(gbAngle<=5){gbAngleDir=1;}
    gbAngleLbl.textContent='📐 GÓC: '+Math.round(gbAngle)+'°';
    gbAngleFill.style.width=((gbAngle-5)/80*100)+'%';
    gbDrawTrajectory();
  },28);
}
W.addEventListener('touchstart',onGBPress,{passive:false});
W.addEventListener('mousedown',onGBPress);
function onGBPress(e){
  if(!active||deps<=0||gbFiring)return;
  if(m2active)return; // mode2 dùng riêng
  e.preventDefault();
  if(gbPhase==='angle'){
    clearInterval(gbAngleTimer);gbAngleTimer=null;
    gbPhase='power';gbPower=0;
    var pwrDir=1;
    if(gbPowerTimer)clearInterval(gbPowerTimer);
    gbPowerTimer=setInterval(function(){
      if(!active||gbPhase!=='power')return;
      gbPower+=pwrDir*1.8;
      if(gbPower>=100){gbPower=100;pwrDir=-1;}
      if(gbPower<=0){gbPower=0;pwrDir=1;}
      gbPwrFill.style.width=gbPower+'%';
      gbPwrLbl.textContent='💪 LỰC: '+Math.round(gbPower)+'%';
      gbDrawTrajectory();
    },28);
  } else if(gbPhase==='power'){
    clearInterval(gbPowerTimer);gbPowerTimer=null;
    gbPhase='fire';gbFiring=true;
    gbUI.style.display='none';gbCanvas.style.display='none';gbSight.style.display='none';
    deps=Math.max(0,deps-1);dv.textContent=deps;updateIcons();
    girl.classList.remove('throwing');void girl.offsetWidth;girl.classList.add('throwing');
    setTimeout(function(){girl.classList.remove('throwing');},350);
    gbFireDep();
  }
}
function gbFireDep(){
  var fo=gbGetOrigin();
  var fspd=gbPower/100*20+5;
  var frad=gbAngle*Math.PI/180;
  var fvx=Math.cos(frad)*fspd;
  var fvy=-Math.sin(frad)*fspd;
  var fgrav=0.42,fwind=gbWind*0.07;
  var fdep=document.createElement('div');
  fdep.className='fdep';fdep.textContent='🥿';
  fdep.style.left=fo.x+'px';fdep.style.top=fo.y+'px';
  fdep.style.transform='translate(-50%,-50%)';
  W.appendChild(fdep);
  var frot=0,fpx=fo.x,fpy=fo.y,fdone=false;
  function step(){
    if(fdone)return;
    fvx+=fwind;fvy+=fgrav;fpx+=fvx;fpy+=fvy;
    frot+=fvx*2;
    fdep.style.left=fpx+'px';fdep.style.top=fpy+'px';
    fdep.style.transform='translate(-50%,-50%) rotate('+frot+'deg)';
    var for2=ongGroup.getBoundingClientRect(),fwr2=W.getBoundingClientRect();
    var fox=for2.left-fwr2.left,foy=for2.top-fwr2.top;
    if(!fdone&&fpx>fox-22&&fpx<fox+for2.width+22&&fpy>foy-14&&fpy<foy+for2.height+14){
      fdone=true;fdep.remove();onHit(fpx,fpy);
      setTimeout(function(){if(active&&deps>0)gbStartRound();},700);
      return;
    }
    if(fpx>W.offsetWidth+50||fpy>W.offsetHeight+60||fpx<-50){
      fdep.remove();if(!fdone){fdone=true;onMiss(fpx,fpy);}
      setTimeout(function(){if(active&&deps>0)gbStartRound();else checkEnd();},700);
      return;
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function startGame(){
  score=0;deps=5;hits=0;combo=0;maxCombo=0;
  sv.textContent='0';dv.textContent='5';hv.textContent='0';
  if(gbAngleTimer)clearInterval(gbAngleTimer);
  if(gbPowerTimer)clearInterval(gbPowerTimer);
  updateIcons();ov.style.display='none';active=true;
  instr.style.display='block';
  document.getElementById('hud').style.display='flex';
  document.getElementById('dep-icons').style.display='flex';
  document.getElementById('player-girl').style.display='block';
  startOng();
  setTimeout(gbStartRound,500);
}
function updateIcons(){
  for(var i=0;i<5;i++)document.getElementById('d'+i).classList.toggle('used',i>=deps);
}
function getPos(e){
  if(e.changedTouches&&e.changedTouches.length)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}
function toLocal(gx,gy){var r=W.getBoundingClientRect();return{x:gx-r.left,y:gy-r.top};}

var HIT_TX=['TRÚNG RỒI! 🎯','ÔI ĐAU! 😱','HUYỀN THOẠI! 🏆','ĂN DÉP! 😂','TRỜI ƠI! 😲','DÉP BAY! 🔥'];
var MISS_TX=['HỤT RỒI 😅','TIẾC QUÁ! 😮','TRƯỢT! 💨','CẨN THẬN HƠN! 😆'];

function spawnTear(x,y){
  var t=document.createElement('div');t.className='tear';t.textContent='😢';
  t.style.cssText='left:'+x+'px;top:'+y+'px;position:absolute;z-index:55;font-size:clamp(10px,3vw,18px);animation:tearDrop 0.7s ease-in forwards;';
  W.appendChild(t);setTimeout(function(){t.remove();},800);
}
function onHit(x,y){
  hits++;combo++;if(combo>maxCombo)maxCombo=combo;
  var bonus=combo>=4?combo*25:combo>=3?combo*18:combo>=2?combo*12:10;
  score+=bonus;sv.textContent=score;hv.textContent=hits;
  ongGroup.classList.remove('bonk');void ongGroup.offsetWidth;ongGroup.classList.add('bonk');
  setTimeout(function(){ongGroup.classList.remove('bonk');},480);
  setFace('cry');spawnTear(x,y);
  setTimeout(function(){setFace('sleep');},1200);
  ongSpeed=Math.min(3.0,ongSpeed+0.25);

function m2loop(){
  if(!m2active)return;
  var H=m2canvas.height,W2=m2canvas.width;
  oVY+=G;oY+=oVY;
  if(oY<8){oY=8;oVY=0;}
  if(oY+OH>H-6){oY=H-OH-6;oVY=0;m2doHit();}
  m2ctx.clearRect(0,0,W2,H);
  drawLanes2(W2,H);
  // chim bay phía trên — từ phải sang trái, đụng mất máu
  birds2=birds2.filter(function(b){
    b.x+=b.spd;b.flap++;
    if(b.x>W2+60||b.x<-80)return false;
    var bNear=Math.abs(b.x-oX)<180&&b.x>oX-40;
    m2ctx.save();
    m2ctx.globalAlpha=0.88;
    if(bNear){m2ctx.shadowColor='#ff00ff';m2ctx.shadowBlur=16;}
    m2ctx.font=b.sz+'px serif';
    var fy=1+Math.sin(b.flap*0.35)*0.18;
    m2ctx.translate(b.x,b.y);
    m2ctx.scale(b.spd>0?-1:1,fy);
    m2ctx.fillText(b.emoji,0,0);
    m2ctx.restore();
    // collision với ông
    var hb=b.sz*0.55;
    if(!b.counted&&b.x<oX+OW-6&&b.x+hb>oX+6&&b.y<oY+OH*0.5&&b.y+hb>oY){
      b.counted=true;
      m2doBirdHit(b.x,b.y,b.emoji);
      return false;
    }
    return true;
  });
  // gà vịt phía dưới — từ phải sang trái, đụng mất máu
  chicks2=chicks2.filter(function(c){
    c.x+=c.spd;c.step++;
    if(c.x>W2+60||c.x<-80)return false;
    var cNear=Math.abs(c.x-oX)<180&&c.x>oX-40;
    m2ctx.save();
    m2ctx.globalAlpha=0.9;
    if(cNear){m2ctx.shadowColor='#ffaa00';m2ctx.shadowBlur=16;}
    m2ctx.font=c.sz+'px serif';
    var bob=Math.abs(Math.sin(c.step*0.25))*5;
    m2ctx.translate(c.x,c.y-bob);
    m2ctx.scale(c.spd>0?-1:1,1);
    m2ctx.fillText(c.emoji,0,0);
    m2ctx.restore();
    // collision với ông
    var hb2=c.sz*0.55;
    if(!c.counted&&c.x<oX+OW-6&&c.x+hb2>oX+6&&c.y-bob<oY+OH&&c.y-bob+hb2>oY+OH*0.5){
      c.counted=true;
      m2doBirdHit(c.x,c.y-bob,c.emoji);
      return false;
    }
    return true;
  });
  // xe
  cars2=cars2.filter(function(c){
    c.x-=c.spd;if(c.x<-80)return false;
    m2ctx.save();
    var near=c.x-oX<200&&c.x-oX>0;
    if(near){m2ctx.shadowColor='#ff6600';m2ctx.shadowBlur=22;}
    m2ctx.font=c.sz+'px serif';m2ctx.fillText(c.emoji,c.x,c.y);
    if(near){
      m2ctx.shadowBlur=0;m2ctx.fillStyle='rgba(255,100,0,.9)';
      m2ctx.font='bold '+clampSz(11,3,15)+'px sans-serif';
      m2ctx.fillText('⚠️ XE!',c.x,c.y-c.sz*0.3);
    }
    m2ctx.restore();
    var cHb=c.sz*0.65;
    if(!c.counted&&c.x<oX+OW-4&&c.x+cHb>oX+4&&c.y-c.sz*0.05<oY+OH-6&&c.y+cHb*0.4>oY+6){
      c.counted=true;m2doCarHit();return false;
    }
    return true;
  });
  // dép
  deps2=deps2.filter(function(d){
    d.x-=d.spd;if(d.x<-60)return false;
    var depNear=d.x-oX<160&&d.x-oX>0;
    m2ctx.save();
    if(depNear){m2ctx.shadowColor='#ff3300';m2ctx.shadowBlur=18;}
    m2ctx.font=d.sz+'px serif';
    m2ctx.translate(d.x,d.y);m2ctx.rotate(d.isTop?0.5:-0.5);
    m2ctx.fillText('🥿',0,0);m2ctx.restore();
    var depHb=d.sz*0.5;
    if(!d.counted&&d.x<oX+OW-8&&d.x+depHb>oX+8&&d.y<oY+OH-10&&d.y+depHb>oY+10){
      d.counted=true;m2doHit();return false;
    }
    if(!d.counted&&d.x+d.sz<oX){
      d.counted=true;m2dodged++;m2score+=20;
      m2svEl.textContent=m2score;m2dodgedEl.textContent=m2dodged+'/15';
      if(m2dodged%4===0)m2spawnInterval=Math.max(700,m2spawnInterval-130);
      spawnText(oX+OW/2,oY-10,'😎 NÉ!','#00ff88',clampSz(14,4,22));
      if(m2dodged>=15){m2active=false;setTimeout(endMode2,300);}
    }
    return true;
  });
  drawOng2(oX,oY);
  m2rafId=requestAnimationFrame(m2loop);
}

function drawOng2(x,y){
  m2ctx.save();
  m2ctx.fillStyle='#f0f0ee';
  m2ctx.beginPath();m2ctx.ellipse(x+OW/2,y+OH*0.6,OW/2,OH*0.28,0,0,Math.PI*2);m2ctx.fill();
  m2ctx.fillStyle='#e0a870';
  m2ctx.beginPath();m2ctx.ellipse(x+OW/2,y+OH*0.26,OW*0.4,OH*0.26,0,0,Math.PI*2);m2ctx.fill();
  m2ctx.fillStyle='#1a0e05';
  m2ctx.beginPath();m2ctx.ellipse(x+OW/2,y+OH*0.14,OW*0.38,OH*0.16,0,Math.PI,Math.PI*2);m2ctx.fill();
  m2ctx.strokeStyle='#1a0e05';m2ctx.lineWidth=2;m2ctx.setLineDash([]);
  m2ctx.beginPath();m2ctx.arc(x+OW*.35,y+OH*.26,4,0.2,Math.PI-.2);m2ctx.stroke();
  m2ctx.beginPath();m2ctx.arc(x+OW*.65,y+OH*.26,4,0.2,Math.PI-.2);m2ctx.stroke();
  m2ctx.strokeStyle='#1a1a28';m2ctx.lineWidth=7;m2ctx.lineCap='round';
  m2ctx.beginPath();m2ctx.moveTo(x+OW*.35,y+OH*.85);m2ctx.lineTo(x+OW*.25,y+OH);m2ctx.stroke();
  m2ctx.beginPath();m2ctx.moveTo(x+OW*.65,y+OH*.85);m2ctx.lineTo(x+OW*.75,y+OH);m2ctx.stroke();
  m2ctx.fillStyle='rgba(180,180,180,0.8)';m2ctx.font='bold 11px sans-serif';
  m2ctx.fillText('zzz',x+OW*.7,y+OH*.05);
  m2ctx.restore();
}

function m2doHit(){
  if(m2hitCooldown||!m2active)return;
  m2hitCooldown=true;
  m2lives=Math.max(0,m2lives-1);
  m2livesEl.textContent=['💔','❤️','❤️❤️','❤️❤️❤️'][m2lives];
  var flashDep=document.createElement('div');
  flashDep.style.cssText='position:absolute;inset:0;background:rgba(255,0,0,.28);z-index:90;pointer-events:none;';
  W.appendChild(flashDep);setTimeout(function(){flashDep.remove();},350);
  spawnTear(oX+OW*.7,oY+10);
  spawnText(oX+OW/2,oY-10,'AY! 😵','#ff4444',clampSz(16,4.5,26));
  oVY=JF*0.6;

    m2hitCooldown=false;

}
